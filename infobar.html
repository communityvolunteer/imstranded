<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sitrep Bar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="airports.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:transparent;font-family:'Inter',sans-serif;}

.sitrep{
  display:flex;
  height:100px;
  background:#000;
  overflow:hidden;
}

.sitrep-stat{
  flex:1;min-width:130px;
  padding:.9rem 1rem 1rem;
  border-right:1px solid rgba(255,255,255,.1);
  text-align:center;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.sitrep-stat:last-child{border-right:none;}

.sitrep-num{
  font-size:2.1rem;font-weight:900;letter-spacing:-.04em;
  line-height:1;margin-bottom:.2rem;display:block;
  color:#fff;font-variant-numeric:tabular-nums;
}

.sitrep-label{
  font-size:.58rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#fff;line-height:1.3;
}

.sitrep-sub{
  font-size:.5rem;color:rgba(255,255,255,.55);margin-top:.1rem;
}

.sitrep-cta{
  flex:1;min-width:160px;
  background:#3498ec;
  border-right:none;
  display:flex;align-items:center;justify-content:center;
  padding:.9rem 1.2rem;
  text-decoration:none;
  cursor:pointer;
}

.launch-btn{
  display:inline-flex;align-items:center;gap:.5rem;
  background:transparent;
  color:#fff;
  font-family:'Inter',sans-serif;
  font-size:1.5rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  text-decoration:none;
  white-space:nowrap;
}
</style>
</head>
<body>

<div class="sitrep">
  <div class="sitrep-stat">
    <span class="sitrep-num" id="stat-days">--</span>
    <div class="sitrep-label">Days In</div>
  </div>
  <div class="sitrep-stat">
    <span class="sitrep-num" id="stat-stranded">--</span>
    <div class="sitrep-label">Est. Stranded</div>
  </div>
  <div class="sitrep-stat">
    <span class="sitrep-num" id="stat-cities">--</span>
    <div class="sitrep-label">Cities Affected</div>
  </div>
  <div class="sitrep-stat">
    <span class="sitrep-num" id="stat-countries">--</span>
    <div class="sitrep-label">Countries Affected</div>
  </div>
  <a class="sitrep-cta" href="https://help.imstranded.org" target="_top">
    <span class="launch-btn">LAUNCH APP</span>
  </a>
</div>

<script>
const SUPABASE_URL  = 'https://nzvlvqyitsjuxnafcuhl.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56dmx2cXlpdHNqdXhuYWZjdWhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTQxOTEsImV4cCI6MjA4Nzk5MDE5MX0.K4JCnTJTBR7zQBaLmxbeZS2QBRCIxdVzbZKrmapOEkw';
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const CRISIS_START = '2026-03-01';
const AVG_PAX = 185;

// Build IATA → { city, country } lookup from airports.js
const IATA_MAP = {};
if (typeof AIRPORTS_RAW !== 'undefined') {
  AIRPORTS_RAW.forEach(([iata, city, , countryCode]) => {
    IATA_MAP[iata] = { city, country: countryCode };
  });
}

function getDaysIn() {
  const start = new Date(CRISIS_START + 'T00:00:00Z');
  const diff = Date.now() - start.getTime();
  return Math.max(1, Math.floor(diff / 86400000) + 1);
}

function animCount(id, target, dur) {
  const el = document.getElementById(id);
  if (!el || target == null) return;
  const startVal = parseInt(el.textContent.replace(/[^0-9]/g, '')) || 0;
  const start = Date.now();
  const step = () => {
    const p = Math.min((Date.now() - start) / dur, 1);
    const v = Math.round(startVal + (target - startVal) * (1 - Math.pow(1 - p, 3)));
    el.textContent = v.toLocaleString();
    if (p < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

async function refresh() {
  // Block 1: always live
  document.getElementById('stat-days').textContent = getDaysIn();

  try {
    // Est. Stranded — match app exactly: group by IATA, sum cancelled per airport, × AVG_PAX
    const today = new Date().toISOString().slice(0, 10);
    const { data: adRows, error: adErr } = await _sb
      .from('airport_daily')
      .select('iata, cancelled')
      .gte('date', CRISIS_START)
      .lte('date', today)
      .eq('is_me_hub', true);

    if (!adErr && adRows && adRows.length) {
      const apTotals = {};
      for (const row of adRows) {
        apTotals[row.iata] = (apTotals[row.iata] || 0) + (row.cancelled || 0);
      }
      const totalCancelled = Object.values(apTotals).reduce((s, c) => s + c, 0);
      animCount('stat-stranded', totalCancelled * AVG_PAX, 1200);
    }

    // Cities + Countries — distinct arr_iata destinations from route_daily
    const cities = new Set();
    const countries = new Set();
    let page = 0;
    const PAGE_SIZE = 1000;

    while (true) {
      const { data: routes, error: rErr } = await _sb
        .from('route_daily')
        .select('arr_iata')
        .gte('date', CRISIS_START)
        .range(page * PAGE_SIZE, (page + 1) * PAGE_SIZE - 1);

      if (rErr || !routes || !routes.length) break;

      routes.forEach(r => {
        const ap = IATA_MAP[r.arr_iata];
        if (ap) {
          cities.add(ap.city);
          countries.add(ap.country);
        } else if (r.arr_iata) {
          cities.add(r.arr_iata); // fallback: use IATA code as city
        }
      });

      if (routes.length < PAGE_SIZE) break;
      page++;
    }

    animCount('stat-cities',    cities.size,    600);
    animCount('stat-countries', countries.size, 600);

  } catch(e) {
    console.error('infobar refresh error:', e);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  refresh();
  setInterval(refresh, 5 * 60 * 1000);
});
</script>
</body>
</html>
