<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sitrep Bar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:transparent;font-family:'Inter',sans-serif;}

.sitrep{
  display:flex;
  height:100px;
  background:#000;
  overflow:hidden;
}

.sitrep-stat{
  flex:1;min-width:130px;
  padding:.9rem 1rem 1rem;
  border-right:1px solid rgba(255,255,255,.1);
  text-align:center;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.sitrep-stat:last-child{border-right:none;}

.sitrep-num{
  font-size:2.1rem;font-weight:900;letter-spacing:-.04em;
  line-height:1;margin-bottom:.2rem;display:block;
  color:#fff;font-variant-numeric:tabular-nums;
}

.sitrep-label{
  font-size:.58rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#fff;line-height:1.3;
}

.sitrep-sub{
  font-size:.5rem;color:rgba(255,255,255,.55);margin-top:.1rem;
}

.sitrep-cta{
  flex:1;min-width:160px;
  background:#3498ec;
  border-right:none;
  display:flex;align-items:center;justify-content:center;
  padding:.9rem 1.2rem;
  text-decoration:none;
  cursor:pointer;
}

.launch-btn{
  display:inline-flex;align-items:center;gap:.5rem;
  background:transparent;
  color:#fff;
  font-family:'Inter',sans-serif;
  font-size:1.5rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  text-decoration:none;
  white-space:nowrap;
}
</style>
</head>
<body>

<div class="sitrep">
  <div class="sitrep-stat">
    <span class="sitrep-num" id="stat-days">--</span>
    <div class="sitrep-label">Days In</div>
  </div>
  <div class="sitrep-stat">
    <span class="sitrep-num" id="stat-stranded">--</span>
    <div class="sitrep-label">People Impacted</div>
  </div>
  <div class="sitrep-stat">
    <span class="sitrep-num" id="stat-cities">--</span>
    <div class="sitrep-label">Cities Affected</div>
  </div>
  <div class="sitrep-stat">
    <span class="sitrep-num" id="stat-countries">--</span>
    <div class="sitrep-label">Countries Affected</div>
  </div>
  <a class="sitrep-cta" href="https://help.imstranded.org" target="_top">
    <span class="launch-btn">LAUNCH APP</span>
  </a>
</div>

<script>
const SUPABASE_URL  = 'https://nzvlvqyitsjuxnafcuhl.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56dmx2cXlpdHNqdXhuYWZjdWhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTQxOTEsImV4cCI6MjA4Nzk5MDE5MX0.K4JCnTJTBR7zQBaLmxbeZS2QBRCIxdVzbZKrmapOEkw';
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const CRISIS_START = new Date('2026-03-01T00:00:00Z');

function getDaysIn() {
  const diff = Date.now() - CRISIS_START.getTime();
  return Math.max(1, Math.floor(diff / (1000 * 60 * 60 * 24)) + 1);
}

function animCount(id, target, dur){
  const el = document.getElementById(id);
  if (!el || target == null) return;
  const raw = el.textContent.replace(/[^0-9]/g, '');
  const startVal = raw.length ? parseInt(raw) : 0;
  const start = Date.now();
  const step = () => {
    const p = Math.min((Date.now() - start) / dur, 1);
    const v = Math.round(startVal + (target - startVal) * (1 - Math.pow(1 - p, 3)));
    el.textContent = v.toLocaleString();
    if (p < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

async function refresh() {
  // Block 1: always live, no API needed
  document.getElementById('stat-days').textContent = getDaysIn();

  try {
    const { data, error } = await _sb
      .from('stranded_people')
      .select('group_size, current_location, nationality')
      .is('deleted_at', null);

    if (!error && data && data.length > 0) {
      const totalPeople = data.reduce((s, r) => s + (r.group_size || 1), 0);
      const cities = new Set(data.map(r => (r.current_location || '').trim().toLowerCase()).filter(Boolean));
      const countries = new Set(data.map(r => (r.nationality || '').trim().toLowerCase()).filter(Boolean));

      animCount('stat-stranded', totalPeople, 1200);
      animCount('stat-cities', cities.size, 600);
      animCount('stat-countries', countries.size, 600);
    } else {
      ['stat-stranded','stat-cities','stat-countries'].forEach(id => {
        document.getElementById(id).textContent = '--';
      });
    }
  } catch(e) {
    ['stat-stranded','stat-cities','stat-countries'].forEach(id => {
      document.getElementById(id).textContent = '--';
    });
  }
}

document.addEventListener('DOMContentLoaded', () => {
  refresh();
  setInterval(refresh, 5 * 60 * 1000);
});
</script>
</body>
</html>
