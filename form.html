<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Offer a Spare Room</title>
<link rel="icon" type="image/webp" href="https://imstranded.org/wp-content/uploads/2026/03/icon12.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://telegram.org/js/telegram-widget.js?22"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:transparent;min-height:100%;font-family:'Inter',sans-serif;}

.form-wrap{
  max-width:546px;margin:0 auto;
  padding:1.56rem 1.82rem 2.08rem;
  background:rgb(0,0,0);border-radius:20px;border:1.7px solid #333;
}
.form-handle{width:36px;height:4px;background:rgba(255,255,255,.25);border-radius:2px;margin:0 auto .78rem;}
.form-title{font-size:1.69rem;font-weight:800;color:#fff;text-align:center;padding:.26rem 0 1.04rem;letter-spacing:.01em;}
.form-row{margin-bottom:1.17rem;}
.form-label{display:block;font-size:.81rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#fff;margin-bottom:.42rem;}
.form-label span{color:rgba(255,255,255,.45);font-weight:500;text-transform:none;letter-spacing:0;}
.form-row input,.form-row textarea{
  width:100%;border:1.5px solid rgba(255,255,255,.15);border-radius:10px;
  padding:.81rem 1.24rem;font-family:'Inter',sans-serif;font-size:1.1rem;
  color:#fff;background:#141414;outline:none;-webkit-appearance:none;
  transition:border-color .15s,background .15s;
}
.form-row input::placeholder,.form-row textarea::placeholder{color:#666;}
.form-row input:focus,.form-row textarea:focus{border-color:#3498ec;background:#1e2224;}
.form-row textarea{min-height:114px;resize:none;}

.form-submit{
  width:100%;background:#2f3133;color:#fff;border:none;border-radius:12px;
  padding:1.24rem;font-family:'Inter',sans-serif;font-size:1rem;font-weight:800;
  cursor:pointer;margin-top:.33rem;letter-spacing:.03em;text-transform:uppercase;
  transition:background .15s;
}
.form-submit:hover{background:#3d4043;}
.form-submit:disabled{opacity:.6;cursor:not-allowed;}

.form-success{display:none;text-align:center;padding:2.6rem 1.3rem;}
.form-success svg{margin-bottom:1.04rem;}
.form-success-title{font-size:1.43rem;font-weight:800;color:#fff;margin-bottom:.39rem;}
.form-success-sub{font-size:1.07rem;color:rgba(255,255,255,.55);line-height:1.5;}
.form-success-link{display:inline-block;margin-top:1.3rem;color:#3498ec;font-size:1.09rem;font-weight:700;text-decoration:none;}
.form-success-link:hover{text-decoration:underline;}

.loc-ac-wrap{position:relative;}
.loc-ac-list{position:absolute;left:0;right:0;top:100%;z-index:100;background:#141414;border:1.5px solid rgba(255,255,255,.15);border-top:none;border-radius:0 0 10px 10px;max-height:200px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.loc-ac-list.open{display:block;}
.loc-ac-item{padding:.55rem .85rem;font-size:.95rem;color:rgba(255,255,255,.8);cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);font-family:'Inter',sans-serif;}
.loc-ac-item:last-child{border-bottom:none;}
.loc-ac-item:hover,.loc-ac-item.active{background:rgba(52,152,236,.15);color:#fff;}
.loc-ac-item small{display:block;font-size:.78rem;color:rgba(255,255,255,.4);margin-top:.1rem;}

/* Auth */
.auth-bar{display:flex;align-items:center;justify-content:space-between;padding:.6rem .8rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;margin-bottom:1.3rem;}
.auth-bar-text{font-size:.78rem;color:rgba(255,255,255,.45);line-height:1.4;}
.auth-bar-text strong{color:#fff;}
.auth-bar-btns{display:flex;gap:.4rem;}
.auth-bar-btn{border:none;border-radius:8px;padding:.4rem .7rem;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:.35rem;transition:opacity .15s;}
.auth-bar-btn:hover{opacity:.85;}
.auth-signout{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:.25rem .6rem;font-size:.65rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}

/* Linked fields */
.linked-input{position:relative;display:flex;align-items:center;background:#141414;border:1.5px solid rgba(255,255,255,.15);border-radius:10px;overflow:hidden;transition:border-color .15s;}
.linked-input--active{border-color:rgba(52,152,236,.3);}
.linked-input-icon{width:34px;height:34px;min-width:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin:4px 0 4px 7px;cursor:pointer;transition:opacity .15s;}
.linked-input-icon:hover{opacity:.8;}
.linked-input-field{flex:1;border:none !important;background:transparent !important;padding:.7rem .9rem !important;margin:0 !important;font-family:'Inter',sans-serif;font-size:.95rem;color:rgba(255,255,255,.35);outline:none;cursor:default;}
.linked-input-field.filled{color:#fff;font-weight:500;}
.linked-input-lock{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:rgba(52,152,236,.5);display:none;}
.linked-input--active .linked-input-lock{display:block;}
</style>
</head>
<body>

<div class="form-wrap" id="form-wrap">
  <div class="form-handle"></div>
  <div class="form-title">OFFER A SPARE ROOM</div>

  <!-- Auth bar -->
  <div class="auth-bar" id="f-auth-bar">
    <div class="auth-bar-text" id="f-auth-text">Sign in to post and get a verified badge.</div>
    <div class="auth-bar-btns" id="f-auth-btns">
      <button class="auth-bar-btn" style="background:#fff;color:#333" onclick="fSignInGoogle()">
        <svg width="13" height="13" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="auth-bar-btn" style="background:#229ED9;color:#fff" onclick="fSignInTelegram()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="#fff"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.96 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
        Telegram
      </button>
    </div>
  </div>

  <div id="form-fields">
    <div class="form-row">
      <label class="form-label">Your Location</label>
      <div class="loc-ac-wrap">
        <input type="text" id="f-location" placeholder="Start typing an address…" autocomplete="off">
        <input type="hidden" id="f-lat">
        <input type="hidden" id="f-lng">
        <div class="loc-ac-list" id="f-location-ac"></div>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Details</label>
      <textarea id="f-body" placeholder="Describe what you can offer…"></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">Your Name</label>
      <input type="text" id="f-name" placeholder="First name or handle">
    </div>

    <!-- Linked account fields -->
    <div class="form-row">
      <label class="form-label">Email</label>
      <div class="linked-input" id="f-linked-google">
        <div class="linked-input-icon" style="background:#1a1a1a" onclick="fSignInGoogle()" title="Google">
          <svg width="14" height="14" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        </div>
        <input type="text" id="f-contact" readonly placeholder="Sign in with Google to add email" class="linked-input-field">
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">Telegram</label>
      <div class="linked-input" id="f-linked-tg">
        <div class="linked-input-icon" style="background:#229ED9" onclick="fLinkTelegram()" title="Link Telegram">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.96 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
        </div>
        <input type="text" id="f-tg-contact" readonly placeholder="Link Telegram to add contact" class="linked-input-field">
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">X / Twitter</label>
      <div class="linked-input" id="f-linked-x">
        <div class="linked-input-icon" style="background:#000;border:1px solid rgba(255,255,255,.15)" onclick="fLinkX()" title="Link X">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </div>
        <input type="text" id="f-xhandle" readonly placeholder="Link X to add @handle & enable tips" class="linked-input-field">
      </div>
    </div>

    <button class="form-submit" id="f-submit" onclick="submitOffer()">OFFER A ROOM</button>
  </div>

  <div class="form-success" id="form-success">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#3498ec" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <div class="form-success-title">Your offer is live!</div>
    <div class="form-success-sub">Someone stranded nearby can now see your offer and reach out. Thank you.</div>
    <a class="form-success-link" href="#" onclick="resetForm();return false;">Post another offer →</a>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://nzvlvqyitsjuxnafcuhl.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56dmx2cXlpdHNqdXhuYWZjdWhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTQxOTEsImV4cCI6MjA4Nzk5MDE5MX0.K4JCnTJTBR7zQBaLmxbeZS2QBRCIxdVzbZKrmapOEkw';
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let _fUser = null;
let _fProfile = null;
const lockSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';

// ── Auth ──
async function fInitAuth() {
  const { data: { session } } = await _sb.auth.getSession();
  if (session?.user) { _fUser = session.user; await fLoadProfile(); }
  _sb.auth.onAuthStateChange(async (ev, session) => {
    if (ev === 'SIGNED_IN' && session?.user) { _fUser = session.user; await fLoadProfile(); }
    else if (ev === 'SIGNED_OUT') { _fUser = null; _fProfile = null; fUpdateUI(); }
  });
}

async function fLoadProfile() {
  if (!_fUser) return;
  let { data } = await _sb.from('profiles').select('*').eq('id', _fUser.id).single();
  if (!data) {
    const meta = _fUser.user_metadata || {};
    await _sb.from('profiles').insert({ id: _fUser.id, email: _fUser.email, display_name: meta.full_name || meta.name || '', avatar_url: meta.avatar_url || meta.picture || '', google_verified: true });
    const res = await _sb.from('profiles').select('*').eq('id', _fUser.id).single();
    data = res.data;
  }
  _fProfile = data;
  fUpdateUI();
}

function fSignInGoogle() {
  _sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href.split('#')[0] } });
}

function fSignInTelegram() {
  window.Telegram.Login.auth({ bot_id: '8600585901', request_access: 'write' }, async function(tgData) {
    if (!tgData) return;
    try {
      const res = await fetch('https://help.imstranded.org/api/auth/telegram', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...tgData, mode: _fUser ? 'login' : 'signup' })
      });
      const result = await res.json();
      if (!res.ok) { alert(result.detail || result.error || 'Login failed'); return; }
      await _sb.auth.signInWithPassword({ email: result.email, password: result.password });
    } catch (e) { alert('Login failed: ' + e.message); }
  });
}

function fLinkTelegram() {
  if (!_fUser) { fSignInTelegram(); return; }
  window.Telegram.Login.auth({ bot_id: '8600585901', request_access: 'write' }, async function(tgData) {
    if (!tgData) return;
    const handle = tgData.username || tgData.first_name || '';
    await _sb.from('profiles').update({ tg_handle: handle, tg_verified: true }).eq('id', _fUser.id);
    await fLoadProfile();
  });
}

function fLinkX() {
  if (!_fUser) { alert('Please sign in first.'); return; }
  window.location.href = 'https://help.imstranded.org/api/auth/x-login?mode=link&user_id=' + _fUser.id;
}

// ── UI Update ──
function fUpdateUI() {
  const bar = document.getElementById('f-auth-bar');
  const textEl = document.getElementById('f-auth-text');
  const btnsEl = document.getElementById('f-auth-btns');

  if (_fUser) {
    const name = _fProfile?.display_name || _fUser.email;
    textEl.innerHTML = `Signed in as <strong>${name}</strong>`;
    btnsEl.innerHTML = `<button class="auth-signout" onclick="fSignOut()">Sign Out</button>`;
  } else {
    textEl.textContent = 'Sign in to post and get a verified badge.';
    btnsEl.innerHTML = `
      <button class="auth-bar-btn" style="background:#fff;color:#333" onclick="fSignInGoogle()"><svg width="13" height="13" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Google</button>
      <button class="auth-bar-btn" style="background:#229ED9;color:#fff" onclick="fSignInTelegram()"><svg width="13" height="13" viewBox="0 0 24 24" fill="#fff"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.96 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>Telegram</button>`;
  }

  // Update linked fields
  fUpdateField('f-contact', _fProfile?.google_verified && _fUser?.email, _fUser?.email || '', 'Sign in with Google to add email');
  fUpdateField('f-tg-contact', _fProfile?.tg_verified && _fProfile?.tg_handle, '@' + (_fProfile?.tg_handle || ''), _fUser ? 'Link Telegram to add contact' : 'Sign in to link Telegram');
  fUpdateField('f-xhandle', _fProfile?.x_verified && _fProfile?.x_handle, '@' + (_fProfile?.x_handle || ''), _fUser ? 'Link X to add @handle & enable tips' : 'Sign in to link X');
}

function fUpdateField(inputId, isLinked, value, placeholder) {
  const input = document.getElementById(inputId);
  const wrap = input?.closest('.linked-input');
  if (!input || !wrap) return;
  if (isLinked) {
    input.value = value;
    input.classList.add('filled');
    wrap.classList.add('linked-input--active');
    if (!wrap.querySelector('.linked-input-lock')) wrap.insertAdjacentHTML('beforeend', `<div class="linked-input-lock">${lockSvg}</div>`);
  } else {
    input.value = '';
    input.classList.remove('filled');
    wrap.classList.remove('linked-input--active');
    const lock = wrap.querySelector('.linked-input-lock');
    if (lock) lock.remove();
    input.placeholder = placeholder;
  }
}

async function fSignOut() {
  await _sb.auth.signOut();
  _fUser = null; _fProfile = null; fUpdateUI();
}

// ── Location Autocomplete ──
(function(){
  const input=document.getElementById('f-location'),latEl=document.getElementById('f-lat'),lngEl=document.getElementById('f-lng'),list=document.getElementById('f-location-ac');
  let timer=null,idx=-1,results=[];
  input.addEventListener('input',()=>{
    clearTimeout(timer);const q=input.value.trim();
    if(q.length<3){list.classList.remove('open');return;}
    latEl.value='';lngEl.value='';
    timer=setTimeout(async()=>{
      try{
        const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1`,{headers:{'Accept-Language':'en','User-Agent':'ImStranded/1.0'}});
        results=await r.json();if(!results.length){list.classList.remove('open');return;}
        idx=-1;
        list.innerHTML=results.map((r,i)=>{const main=r.display_name.split(',').slice(0,3).join(',');const rest=r.display_name.split(',').slice(3).join(',');return `<div class="loc-ac-item" data-idx="${i}">${main}${rest?`<small>${rest}</small>`:''}</div>`;}).join('');
        list.classList.add('open');
        list.querySelectorAll('.loc-ac-item').forEach(item=>{item.addEventListener('mousedown',e=>{e.preventDefault();pick(parseInt(item.dataset.idx));});});
      }catch(e){list.classList.remove('open');}
    },350);
  });
  function pick(i){const r=results[i];if(!r)return;input.value=r.display_name.split(',').slice(0,3).join(',').trim();latEl.value=r.lat;lngEl.value=r.lon;list.classList.remove('open');}
  input.addEventListener('keydown',e=>{const items=list.querySelectorAll('.loc-ac-item');if(!items.length||!list.classList.contains('open'))return;if(e.key==='ArrowDown'){e.preventDefault();idx=Math.min(idx+1,items.length-1);items.forEach((it,i)=>it.classList.toggle('active',i===idx));}else if(e.key==='ArrowUp'){e.preventDefault();idx=Math.max(idx-1,0);items.forEach((it,i)=>it.classList.toggle('active',i===idx));}else if(e.key==='Enter'&&idx>=0){e.preventDefault();pick(idx);}else if(e.key==='Escape'){list.classList.remove('open');}});
  input.addEventListener('blur',()=>{setTimeout(()=>list.classList.remove('open'),200);});
})();

// ── Submit ──
async function submitOffer(){
  if (!_fUser) { alert('Please sign in first.'); return; }
  const l=document.getElementById('f-location').value.trim();
  const b=document.getElementById('f-body').value.trim();
  const n=document.getElementById('f-name').value.trim();
  const email=document.getElementById('f-contact').value.trim();
  const tg=document.getElementById('f-tg-contact').value.trim();
  const x=(document.getElementById('f-xhandle').value||'').trim().replace(/^@+/,'');
  const lat=parseFloat(document.getElementById('f-lat').value)||null;
  const lng=parseFloat(document.getElementById('f-lng').value)||null;
  const c=[email,tg].filter(Boolean).join(' | ');

  if(!l||!b||!n){alert('Please fill in all required fields.');return;}
  if(!c){alert('Please link at least one contact method (Google or Telegram).');return;}
  if(!lat||!lng){alert('Please select a location from the dropdown.');return;}

  const btn=document.getElementById('f-submit');
  btn.textContent='Posting...';btn.disabled=true;
  try{
    const{error}=await _sb.from('help_posts').insert({type:'offer',post_type:'Housing / spare room',location:l,body:b,name:n,contact:c,xhandle:x||null,lat,lng,user_id:_fUser.id,flagged:false});
    if(error) throw error;
    document.getElementById('form-fields').style.display='none';
    document.getElementById('form-success').style.display='block';
  }catch(e){
    alert('Failed to post: '+e.message);
    btn.textContent='OFFER A ROOM';btn.disabled=false;
  }
}

function resetForm(){
  ['f-location','f-body','f-name'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('f-lat').value='';document.getElementById('f-lng').value='';
  const btn=document.getElementById('f-submit');
  btn.textContent='OFFER A ROOM';btn.disabled=false;
  document.getElementById('form-fields').style.display='block';
  document.getElementById('form-success').style.display='none';
}

fInitAuth();
