<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Offer a Spare Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:transparent;min-height:100%;font-family:'Inter',sans-serif;}

.form-wrap{
  max-width:546px;
  margin:0 auto;
  padding:1.56rem 1.82rem 2.08rem;
  background:rgb(0, 0, 0);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-radius:20px;
  border:1.7px solid #333;
}

.form-handle{
  width:36px;height:4px;background:rgba(255,255,255,.25);
  border-radius:2px;margin:0 auto .78rem;
}

.form-title{
  font-size:1.69rem;font-weight:800;color:#fff;
  text-align:center;padding:.26rem 0 1.04rem;
  letter-spacing:.01em;
}

.form-row{margin-bottom:1.17rem;}

.form-label{
  display:block;font-size:.81rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.07em;
  color:#fff;margin-bottom:.42rem;
}
.form-label span{
  color:rgba(255,255,255,.45);font-weight:500;
  text-transform:none;letter-spacing:0;
}

.form-row input,
.form-row textarea{
  width:100%;
  border:1.5px solid rgba(255,255,255,.15);
  border-radius:10px;
  padding:.81rem 1.24rem;
  font-family:'Inter',sans-serif;
  font-size:1.1rem;
  color:#fff;
  background:#141414;
  outline:none;
  -webkit-appearance:none;
  transition:border-color .15s,background .15s;
}
.form-row input::placeholder,
.form-row textarea::placeholder{
  color:#666;
}
.form-row input:focus,
.form-row textarea:focus{
  border-color:#3498ec;
  background:#1e2224;
}
.form-row textarea{min-height:114px;resize:none;}

.form-submit{
  width:100%;
  background:#2f3133;
  color:#fff;
  border:none;
  border-radius:12px;
  padding:1.24rem;
  font-family:'Inter',sans-serif;
  font-size:1rem;
  font-weight:800;
  cursor:pointer;
  margin-top:.33rem;
  letter-spacing:.03em;
  text-transform:uppercase;
  transition:background .15s;
}
.form-submit:hover{background:#3d4043;}
.form-submit:disabled{opacity:.6;cursor:not-allowed;}

.form-success{
  display:none;
  text-align:center;
  padding:2.6rem 1.3rem;
}
.form-success svg{margin-bottom:1.04rem;}
.form-success-title{
  font-size:1.43rem;font-weight:800;color:#fff;margin-bottom:.39rem;
}
.form-success-sub{
  font-size:1.07rem;color:rgba(255,255,255,.55);line-height:1.5;
}
.form-success-link{
  display:inline-block;margin-top:1.3rem;
  color:#3498ec;font-size:1.09rem;font-weight:700;
  text-decoration:none;
}
.form-success-link:hover{text-decoration:underline;}

.loc-ac-wrap{position:relative;}
.loc-ac-list{
  position:absolute;left:0;right:0;top:100%;z-index:100;
  background:#141414;border:1.5px solid rgba(255,255,255,.15);
  border-top:none;border-radius:0 0 10px 10px;
  max-height:200px;overflow-y:auto;display:none;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.loc-ac-list.open{display:block;}
.loc-ac-item{
  padding:.55rem .85rem;font-size:.95rem;color:rgba(255,255,255,.8);
  cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);
  font-family:'Inter',sans-serif;
}
.loc-ac-item:last-child{border-bottom:none;}
.loc-ac-item:hover,.loc-ac-item.active{background:rgba(52,152,236,.15);color:#fff;}
.loc-ac-item small{display:block;font-size:.78rem;color:rgba(255,255,255,.4);margin-top:.1rem;}
</style>
</head>
<body>

<div class="form-wrap" id="form-wrap">
  <div class="form-handle"></div>
  <div class="form-title">OFFER A SPARE ROOM</div>

  <div id="form-fields">
    <div class="form-row">
      <label class="form-label">Your Location</label>
      <div class="loc-ac-wrap">
        <input type="text" id="f-location" placeholder="Start typing an address…" autocomplete="off">
        <input type="hidden" id="f-lat">
        <input type="hidden" id="f-lng">
        <div class="loc-ac-list" id="f-location-ac"></div>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Details</label>
      <textarea id="f-body" placeholder="Describe what you can offer…"></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">Your Name</label>
      <input type="text" id="f-name" placeholder="First name or handle">
    </div>
    <div class="form-row">
      <label class="form-label">Contact <span>(public)</span></label>
      <input type="text" id="f-contact" placeholder="@telegram or email">
    </div>
    <div class="form-row">
      <label class="form-label">X Handle <span>(optional)</span></label>
      <div style="position:relative"><span style="position:absolute;left:1.24rem;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.7);font-weight:600;font-size:1.1rem;pointer-events:none">@</span><input type="text" id="f-xhandle" placeholder="yourhandle" style="padding-left:2.1rem"></div>
    </div>
    <div class="form-row">
      <label class="form-label">Password <span>(to edit/delete later)</span></label>
      <input type="text" id="f-password" placeholder="Something you'll remember">
    </div>
    <button class="form-submit" id="f-submit" onclick="submitOffer()">OFFER A ROOM</button>
  </div>

  <div class="form-success" id="form-success">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#3498ec" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <div class="form-success-title">Your offer is live!</div>
    <div class="form-success-sub">Someone stranded nearby can now see your offer and reach out. Thank you.</div>
    <a class="form-success-link" href="#" onclick="resetForm();return false;">Post another offer →</a>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://nzvlvqyitsjuxnafcuhl.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56dmx2cXlpdHNqdXhuYWZjdWhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTQxOTEsImV4cCI6MjA4Nzk5MDE5MX0.K4JCnTJTBR7zQBaLmxbeZS2QBRCIxdVzbZKrmapOEkw';
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// Autocomplete
(function(){
  const input=document.getElementById('f-location'),
    latEl=document.getElementById('f-lat'),
    lngEl=document.getElementById('f-lng'),
    list=document.getElementById('f-location-ac');
  let timer=null,idx=-1,results=[];

  input.addEventListener('input',()=>{
    clearTimeout(timer);
    const q=input.value.trim();
    if(q.length<3){list.classList.remove('open');return;}
    latEl.value='';lngEl.value='';
    timer=setTimeout(async()=>{
      try{
        const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1`,{headers:{'Accept-Language':'en','User-Agent':'ImStranded/1.0'}});
        results=await r.json();
        if(!results.length){list.classList.remove('open');return;}
        idx=-1;
        list.innerHTML=results.map((r,i)=>{
          const main=r.display_name.split(',').slice(0,3).join(',');
          const rest=r.display_name.split(',').slice(3).join(',');
          return `<div class="loc-ac-item" data-idx="${i}">${main}${rest?`<small>${rest}</small>`:''}</div>`;
        }).join('');
        list.classList.add('open');
        list.querySelectorAll('.loc-ac-item').forEach(item=>{
          item.addEventListener('mousedown',e=>{e.preventDefault();pick(parseInt(item.dataset.idx));});
        });
      }catch(e){list.classList.remove('open');}
    },350);
  });

  function pick(i){const r=results[i];if(!r)return;input.value=r.display_name.split(',').slice(0,3).join(',').trim();latEl.value=r.lat;lngEl.value=r.lon;list.classList.remove('open');}

  input.addEventListener('keydown',e=>{
    const items=list.querySelectorAll('.loc-ac-item');
    if(!items.length||!list.classList.contains('open'))return;
    if(e.key==='ArrowDown'){e.preventDefault();idx=Math.min(idx+1,items.length-1);items.forEach((it,i)=>it.classList.toggle('active',i===idx));}
    else if(e.key==='ArrowUp'){e.preventDefault();idx=Math.max(idx-1,0);items.forEach((it,i)=>it.classList.toggle('active',i===idx));}
    else if(e.key==='Enter'&&idx>=0){e.preventDefault();pick(idx);}
    else if(e.key==='Escape'){list.classList.remove('open');}
  });
  input.addEventListener('blur',()=>{setTimeout(()=>list.classList.remove('open'),200);});
})();

async function submitOffer(){
  const l = document.getElementById('f-location').value.trim();
  const b = document.getElementById('f-body').value.trim();
  const n = document.getElementById('f-name').value.trim();
  const c = document.getElementById('f-contact').value.trim();
  const x = (document.getElementById('f-xhandle').value||'').trim().replace(/^@+/,'');
  const lat = parseFloat(document.getElementById('f-lat').value)||null;
  const lng = parseFloat(document.getElementById('f-lng').value)||null;

  if(!l||!b||!n||!c){alert('Please fill in all required fields.');return;}
  if(!lat||!lng){alert('Please select a location from the dropdown suggestions.');return;}

  const editCode = document.getElementById('f-password').value.trim();
  if(!editCode||editCode.length<4){alert('Please enter a password (at least 4 characters) to manage your post later.');return;}

  const btn = document.getElementById('f-submit');
  btn.textContent='Posting...'; btn.disabled=true;

  try{
    const{error}=await _sb.from('help_posts').insert({
      type:'offer',post_type:'Housing / spare room',
      location:l,body:b,name:n,contact:c,
      xhandle:x||null,lat,lng,edit_code:editCode,flagged:false
    });
    if(error) throw error;

    document.getElementById('form-fields').style.display='none';
    document.getElementById('form-success').style.display='block';
  }catch(e){
    alert('Failed to post: '+e.message);
    btn.textContent='OFFER A ROOM'; btn.disabled=false;
  }
}

function resetForm(){
  ['f-location','f-body','f-name','f-contact','f-xhandle','f-password'].forEach(id=>{
    document.getElementById(id).value='';
  });
  document.getElementById('f-lat').value='';
  document.getElementById('f-lng').value='';
  const btn=document.getElementById('f-submit');
  btn.textContent='OFFER A ROOM'; btn.disabled=false;
  document.getElementById('form-fields').style.display='block';
  document.getElementById('form-success').style.display='none';
}
</script>
</body>
</html>
