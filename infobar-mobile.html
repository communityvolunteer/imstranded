<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImStranded — Crisis Sitrep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="airports.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#000;font-family:'Inter',sans-serif;overflow-x:hidden;}

@keyframes beacon-pulse{
  0%{transform:scale(1);opacity:.5;}
  50%{transform:scale(2);opacity:0;}
  100%{transform:scale(1);opacity:0;}
}
@keyframes beacon-glow{
  0%,100%{opacity:1;}
  50%{opacity:.4;}
}

.bar{
  padding:1rem 1rem .8rem;
}

/* ── Header row ── */
.bar-header{
  display:flex;align-items:center;gap:.6rem;margin-bottom:.8rem;
}
.bar-beacon{
  position:relative;width:10px;height:10px;flex-shrink:0;
}
.bar-beacon::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:#ec3452;animation:beacon-glow 1.6s ease-in-out infinite;
}
.bar-beacon::after{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  border:1.5px solid #ec3452;animation:beacon-pulse 1.6s ease-out infinite;
}
.bar-title{
  font-size:.6rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.12em;color:rgba(255,255,255,.4);
}
.bar-title span{color:#ec3452;}

/* ── Stats grid ── */
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:rgba(255,255,255,.06);
  border-radius:12px;
  overflow:hidden;
  margin-bottom:.7rem;
}
.stat{
  background:#000;
  padding:.7rem .6rem;
  text-align:center;
}
.stat-num{
  font-size:1.65rem;font-weight:900;letter-spacing:-.03em;
  line-height:1;color:#fff;display:block;
  font-variant-numeric:tabular-nums;
  margin-bottom:.2rem;
}
.stat-num.accent{color:#ec3452;}
.stat-label{
  font-size:.5rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:rgba(255,255,255,.35);
}

/* ── Wide stat row ── */
.stat-wide{
  grid-column:1 / -1;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  background:#000;padding:.6rem;
}
.stat-wide .stat-num{
  font-size:1.3rem;margin-bottom:0;
}
.stat-wide .stat-label{
  text-align:left;
}

/* ── CTA button ── */
.cta{
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  width:100%;padding:.7rem;
  background:#ec3452;
  border:none;border-radius:10px;
  color:#fff;
  font-family:'Inter',sans-serif;
  font-size:.82rem;font-weight:800;
  letter-spacing:.04em;text-transform:uppercase;
  text-decoration:none;
  cursor:pointer;
  transition:opacity .15s;
}
.cta:hover{opacity:.88;}
.cta svg{flex-shrink:0;}
</style>
</head>
<body>

<div class="bar">
  <!-- Header -->
  <div class="bar-header">
    <div class="bar-beacon"></div>
    <div class="bar-title"><span>LIVE</span> — GULF CRISIS SITREP</div>
  </div>

  <!-- Stats grid -->
  <div class="stats">
    <div class="stat">
      <span class="stat-num accent" id="stat-stranded">--</span>
      <div class="stat-label">Est. Stranded</div>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-days">--</span>
      <div class="stat-label">Days In</div>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-cities">--</span>
      <div class="stat-label">Cities Affected</div>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-countries">--</span>
      <div class="stat-label">Countries</div>
    </div>
  </div>

  <!-- CTA -->
  <a class="cta" href="https://help.imstranded.org" target="_top">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    Open the Map
  </a>
</div>

<script>
const SUPABASE_URL  = 'https://nzvlvqyitsjuxnafcuhl.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56dmx2cXlpdHNqdXhuYWZjdWhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTQxOTEsImV4cCI6MjA4Nzk5MDE5MX0.K4JCnTJTBR7zQBaLmxbeZS2QBRCIxdVzbZKrmapOEkw';
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const CRISIS_START = '2026-03-01';
const AVG_PAX = 185;
const FALLBACK = { stranded: 285000, cities: 48, countries: 22 };

const IATA_MAP = {};
if (typeof AIRPORTS_RAW !== 'undefined') {
  AIRPORTS_RAW.forEach(([iata, city, , countryCode]) => {
    IATA_MAP[iata] = { city, country: countryCode };
  });
}

function getDaysIn() {
  const start = new Date(CRISIS_START + 'T00:00:00Z');
  return Math.max(1, Math.floor((Date.now() - start.getTime()) / 86400000) + 1);
}

function animCount(id, target, dur) {
  const el = document.getElementById(id);
  if (!el || target == null) return;
  const startVal = parseInt(el.textContent.replace(/[^0-9]/g, '')) || 0;
  const start = Date.now();
  const step = () => {
    const p = Math.min((Date.now() - start) / dur, 1);
    const v = Math.round(startVal + (target - startVal) * (1 - Math.pow(1 - p, 3)));
    el.textContent = v.toLocaleString();
    if (p < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

function sbTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))
  ]);
}

async function refresh() {
  document.getElementById('stat-days').textContent = getDaysIn();

  try {
    const today = new Date().toISOString().slice(0, 10);
    const { data: adRows, error: adErr } = await sbTimeout(
      _sb.from('airport_daily')
        .select('iata, cancelled')
        .gte('date', CRISIS_START)
        .lte('date', today)
        .eq('is_me_hub', true),
      7000
    );
    if (!adErr && adRows && adRows.length) {
      const apTotals = {};
      for (const row of adRows) {
        apTotals[row.iata] = (apTotals[row.iata] || 0) + (row.cancelled || 0);
      }
      const totalCancelled = Object.values(apTotals).reduce((s, c) => s + c, 0);
      animCount('stat-stranded', Math.round(totalCancelled * AVG_PAX * 0.20), 1200);
    } else {
      animCount('stat-stranded', FALLBACK.stranded, 800);
    }
  } catch(e) {
    animCount('stat-stranded', FALLBACK.stranded, 800);
  }

  try {
    const today = new Date().toISOString().slice(0, 10);
    const cities = new Set();
    const countries = new Set();
    let page = 0;
    const PAGE_SIZE = 1000;
    while (true) {
      const { data: routes, error: rErr } = await sbTimeout(
        _sb.from('route_daily')
          .select('arr_iata')
          .gte('date', CRISIS_START)
          .lte('date', today)
          .range(page * PAGE_SIZE, (page + 1) * PAGE_SIZE - 1),
        7000
      );
      if (rErr || !routes || !routes.length) break;
      routes.forEach(r => {
        const ap = IATA_MAP[r.arr_iata];
        if (ap) { cities.add(ap.city); countries.add(ap.country); }
        else if (r.arr_iata) cities.add(r.arr_iata);
      });
      if (routes.length < PAGE_SIZE) break;
      page++;
    }
    if (cities.size > 0) {
      animCount('stat-cities', cities.size, 600);
      animCount('stat-countries', countries.size, 600);
    } else {
      animCount('stat-cities', FALLBACK.cities, 400);
      animCount('stat-countries', FALLBACK.countries, 400);
    }
  } catch(e) {
    animCount('stat-cities', FALLBACK.cities, 400);
    animCount('stat-countries', FALLBACK.countries, 400);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  animCount('stat-stranded', FALLBACK.stranded, 600);
  animCount('stat-cities', FALLBACK.cities, 400);
  animCount('stat-countries', FALLBACK.countries, 400);
  refresh();
  setInterval(refresh, 5 * 60 * 1000);
});
</script>
</body>
</html>
